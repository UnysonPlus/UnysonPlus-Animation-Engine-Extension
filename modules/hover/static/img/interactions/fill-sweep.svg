<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 96" role="img" aria-label="A color wipes across the element on hover"><g transform="translate(66,36) scale(1.35) translate(-66,-36)">
  <defs><clipPath id="fsc"><rect x="40" y="20" width="52" height="34" rx="6"/></clipPath></defs>
  <rect x="40" y="20" width="52" height="34" rx="6" fill="#bcd3f7"/>
  <g clip-path="url(#fsc)"><rect class="fsw" x="40" y="20" width="52" height="34" fill="#2f74e6"/></g>
  <style>.fsw{animation:fsw 2.2s ease-in-out infinite;transform-origin:40px 37px}@keyframes fsw{0%{transform:scaleX(0)}55%,100%{transform:scaleX(1)}}</style>
  </g><text x="66" y="86" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="15" font-weight="600" fill="#475569">Fill Sweep</text>
</svg>
