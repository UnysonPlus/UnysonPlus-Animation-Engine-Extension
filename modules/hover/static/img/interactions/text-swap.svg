<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 78" role="img" aria-label="The label slides out and a second line slides in on hover"><g transform="translate(66,36) scale(1.35) translate(-66,-36)">
  <defs><clipPath id="tsc"><rect x="40" y="22" width="52" height="30" rx="4"/></clipPath></defs>
  <rect x="40" y="22" width="52" height="30" rx="4" fill="#bcd3f7" opacity="0.45"/>
  <g clip-path="url(#tsc)">
    <rect class="tsa" x="52" y="30" width="28" height="6" rx="3" fill="#2f74e6"/>
    <rect class="tsb" x="52" y="60" width="28" height="6" rx="3" fill="#2f74e6"/>
  </g>
  <style>.tsa{animation:tsa 2.2s ease-in-out infinite}.tsb{animation:tsb 2.2s ease-in-out infinite}@keyframes tsa{0%,20%{transform:translateY(0)}55%,100%{transform:translateY(-30px)}}@keyframes tsb{0%,20%{transform:translateY(0)}55%,100%{transform:translateY(-30px)}}</style>
  </g>
</svg>
