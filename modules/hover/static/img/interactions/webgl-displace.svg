<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 96" role="img" aria-label="WebGL refraction on hover"><g transform="translate(66,36) scale(1.35) translate(-66,-36)">
  <style>
    .wdr{animation:wdr 2.6s ease-in-out infinite}
    .wdb{animation:wdb 2.6s ease-in-out infinite}
    @keyframes wdr{0%,100%{transform:translate(0,0)}50%{transform:translate(-3px,1px)}}
    @keyframes wdb{0%,100%{transform:translate(0,0)}50%{transform:translate(3px,-1px)}}
    .wdw{animation:wdw 2.6s ease-in-out infinite;transform-origin:66px 37px}
    @keyframes wdw{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  </style>
  <defs><clipPath id="wdtile"><rect x="38" y="18" width="56" height="38" rx="5"/></clipPath></defs>
  <g clip-path="url(#wdtile)">
    <g class="wdw">
      <!-- red + blue offset copies read as chromatic refraction, green stays put -->
      <g class="wdr" opacity="0.85"><path d="M38 56 L60 37 L74 49 L83 42 L94 56 Z" fill="#ff3b60"/></g>
      <g class="wdb" opacity="0.85"><path d="M38 56 L60 37 L74 49 L83 42 L94 56 Z" fill="#2f74e6" style="mix-blend-mode:screen"/></g>
      <path d="M38 56 L60 37 L74 49 L83 42 L94 56 Z" fill="#22c55e" opacity="0.55" style="mix-blend-mode:screen"/>
      <circle cx="55" cy="30" r="6" fill="#fbbf24"/>
    </g>
    <rect x="38" y="18" width="56" height="38" rx="5" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  </g>
  </g><text x="66" y="86" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="15" font-weight="600" fill="#475569">WebGL Refract</text>
</svg>
