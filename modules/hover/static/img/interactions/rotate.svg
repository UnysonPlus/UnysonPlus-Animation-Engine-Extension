<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 96" role="img" aria-label="Element rotates on hover"><g transform="translate(66,36) scale(1.35) translate(-66,-36)">
  <style>.ro{animation:ro 2.4s ease-in-out infinite;transform-origin:66px 36px}@keyframes ro{0%,100%{transform:rotate(0)}50%{transform:rotate(12deg)}}</style>
  <rect class="ro" x="46" y="18" width="40" height="36" rx="6" fill="#2f74e6"/>
  </g><text x="66" y="86" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="15" font-weight="600" fill="#475569">Rotate</text>
</svg>
