  <ellipse cx="66" cy="56" rx="20" ry="3.5" fill="#1e293b" opacity="0.15"/>
  <rect class="bo" x="48" y="20" width="36" height="32" rx="6" fill="#2f74e6"/>
  </g>
</svg>
