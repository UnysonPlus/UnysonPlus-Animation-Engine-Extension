<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 78" role="img" aria-label="A light band sweeps across on hover"><g transform="translate(66,36) scale(1.35) translate(-66,-36)">
  <defs><clipPath id="shc"><rect x="40" y="20" width="52" height="34" rx="6"/></clipPath></defs>
  <rect x="40" y="20" width="52" height="34" rx="6" fill="#2f74e6"/>
  <g clip-path="url(#shc)"><rect class="shn" x="20" y="16" width="16" height="44" fill="#ffffff" opacity="0.7" transform="skewX(-18)"/></g>
  <style>.shn{animation:shn 2.2s ease-in-out infinite}@keyframes shn{0%{transform:skewX(-18deg) translateX(0)}60%,100%{transform:skewX(-18deg) translateX(80px)}}</style>
  </g>
</svg>
