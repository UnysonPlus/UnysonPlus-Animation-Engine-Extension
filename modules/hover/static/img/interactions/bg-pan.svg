<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 96" role="img" aria-label="Animated gradient background pans across on hover"><g transform="translate(66,36) scale(1.35) translate(-66,-36)">
  <defs><linearGradient id="pan" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2f74e6"/><stop offset="1" stop-color="#a06bff"/></linearGradient><clipPath id="panc"><rect x="40" y="20" width="52" height="34" rx="6"/></clipPath></defs>
  <g clip-path="url(#panc)"><rect class="pn" x="40" y="20" width="104" height="34" fill="url(#pan)"/></g>
  <style>.pn{animation:pn 2.6s linear infinite}@keyframes pn{from{transform:translateX(0)}to{transform:translateX(-52px)}}</style>
  </g><text x="66" y="86" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="15" font-weight="600" fill="#475569">Background Pan</text>
</svg>
