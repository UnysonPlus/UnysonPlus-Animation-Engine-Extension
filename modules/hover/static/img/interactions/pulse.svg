<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 78" role="img" aria-label="Element pulses continuously on hover"><g transform="translate(66,36) scale(1.35) translate(-66,-36)">
  <style>.pl{animation:pl 1.4s ease-in-out infinite;transform-origin:66px 36px}@keyframes pl{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}.plr{animation:plr 1.4s ease-in-out infinite;transform-origin:66px 36px}@keyframes plr{0%{transform:scale(1);opacity:.5}70%,100%{transform:scale(1.5);opacity:0}}</style>
  <circle class="plr" cx="66" cy="36" r="20" fill="#bcd3f7"/>
  <circle class="pl" cx="66" cy="36" r="18" fill="#2f74e6"/>
  </g>
</svg>
