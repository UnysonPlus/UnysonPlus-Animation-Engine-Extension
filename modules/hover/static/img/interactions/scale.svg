<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 96" role="img" aria-label="Element scales up on hover"><g transform="translate(66,36) scale(1.35) translate(-66,-36)">
  <style>.sc{animation:sc 2s ease-in-out infinite;transform-origin:66px 36px}@keyframes sc{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}</style>
  <rect class="sc" x="44" y="18" width="44" height="36" rx="6" fill="#2f74e6"/>
  </g><text x="66" y="86" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="15" font-weight="600" fill="#475569">Scale / Zoom</text>
</svg>
