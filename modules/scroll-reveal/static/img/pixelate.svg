<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 78" role="img" aria-label="Pixelate In">
  <style>
    .pxb{animation:pxb 2.6s ease-in-out infinite}
    @keyframes pxb{0%,15%{opacity:1}55%,100%{opacity:0}}
    .pxs{animation:pxs 2.6s ease-in-out infinite}
    @keyframes pxs{0%,35%{opacity:0}70%,100%{opacity:1}}
  </style>
  <defs><clipPath id="pxc"><rect x="40" y="10" width="52" height="44" rx="5"/></clipPath></defs>
  <g clip-path="url(#pxc)">
    <!-- sharp target image (fades in) -->
    <g class="pxs">
      <rect x="40" y="10" width="52" height="44" fill="#bcd3f7"/>
      <circle cx="54" cy="24" r="6" fill="#fbbf24"/>
      <path d="M40 54 L58 34 L70 45 L80 38 L92 54 Z" fill="#2f74e6"/>
    </g>
    <!-- chunky pixel blocks (fade out) -->
    <g class="pxb" shape-rendering="crispEdges">
      <rect x="40" y="10" width="13" height="11" fill="#9dc0f0"/><rect x="53" y="10" width="13" height="11" fill="#bcd3f7"/><rect x="66" y="10" width="13" height="11" fill="#7ea9e8"/><rect x="79" y="10" width="13" height="11" fill="#bcd3f7"/>
      <rect x="40" y="21" width="13" height="11" fill="#bcd3f7"/><rect x="53" y="21" width="13" height="11" fill="#fbbf24"/><rect x="66" y="21" width="13" height="11" fill="#9dc0f0"/><rect x="79" y="21" width="13" height="11" fill="#bcd3f7"/>
      <rect x="40" y="32" width="13" height="11" fill="#5b8fe0"/><rect x="53" y="32" width="13" height="11" fill="#2f74e6"/><rect x="66" y="32" width="13" height="11" fill="#4f86df"/><rect x="79" y="32" width="13" height="11" fill="#7ea9e8"/>
      <rect x="40" y="43" width="13" height="11" fill="#2f74e6"/><rect x="53" y="43" width="13" height="11" fill="#3d7ce0"/><rect x="66" y="43" width="13" height="11" fill="#2f74e6"/><rect x="79" y="43" width="13" height="11" fill="#5b8fe0"/>
    </g>
  </g>
  
</svg>
