<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 78" role="img" aria-label="Scrub: progress tied to scroll position"><g transform="translate(66,36) scale(1.35) translate(-66,-36)">
  <style>
    .fl{animation:fl 2.4s ease-in-out infinite}
    @keyframes fl{0%{width:0}55%,82%{width:56px}100%{width:0}}
  </style>
  <rect x="38" y="34" width="56" height="9" rx="4.5" fill="#e2e8f0"/>
  <rect class="fl" x="38" y="34" width="0" height="9" rx="4.5" fill="#2f74e6"/>
  <!-- scroll indicator -->
  <rect x="100" y="22" width="9" height="34" rx="4.5" fill="none" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="103" y="26" width="3" height="8" rx="1.5" fill="#94a3b8"/>
  </g>
</svg>
