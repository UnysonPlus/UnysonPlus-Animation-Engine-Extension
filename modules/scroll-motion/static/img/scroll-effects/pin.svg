<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 78" role="img" aria-label="Pin: element sticks while the page scrolls past"><g transform="translate(66,36) scale(1.35) translate(-66,-36)">
  <style>
    .pp{animation:pp 1.8s linear infinite}.pp2{animation-delay:.9s}
    @keyframes pp{0%{transform:translateY(12px);opacity:0}25%,70%{opacity:.8}100%{transform:translateY(-14px);opacity:0}}
  </style>
  <!-- page-scroll chevrons passing behind the pinned element -->
  <path class="pp"     d="M98 44 l5 -6 5 6" fill="none" stroke="#cbd5e1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path class="pp pp2" d="M98 44 l5 -6 5 6" fill="none" stroke="#cbd5e1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- pinned card -->
  <rect x="34" y="26" width="44" height="28" rx="5" fill="#2f74e6"/>
  <!-- pushpin -->
  <circle cx="56" cy="20" r="5" fill="#94a3b8"/>
  <line x1="56" y1="25" x2="56" y2="28" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
