<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 78" role="img" aria-label="Parallax: layers move at different speeds"><g transform="translate(66,36) scale(1.35) translate(-66,-36)">
  <style>
    .pb{animation:pb 3s ease-in-out infinite}.pf{animation:pf 3s ease-in-out infinite}
    @keyframes pb{0%,100%{transform:translateY(-7px)}50%{transform:translateY(7px)}}
    @keyframes pf{0%,100%{transform:translateY(5px)}50%{transform:translateY(-5px)}}
  </style>
  <rect class="pb" x="40" y="20" width="24" height="34" rx="4" fill="#cbd5e1"/>
  <rect class="pf" x="70" y="20" width="24" height="34" rx="4" fill="#2f74e6"/>
  </g>
</svg>
