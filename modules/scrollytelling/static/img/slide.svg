  <style>
    .slt{animation:slt 2.6s ease-in-out infinite}
    @keyframes slt{0%,15%{transform:translateX(52px)}55%,100%{transform:translateX(0)}}
  </style>
  <defs><clipPath id="sl"><rect x="40" y="10" width="52" height="44" rx="5"/></clipPath></defs>
  <g clip-path="url(#sl)">
