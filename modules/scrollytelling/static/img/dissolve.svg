<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 78" role="img" aria-label="Dissolve">
  <style>
    .diss-d{animation:diss-k 2.6s ease-in-out infinite}
    @keyframes diss-k{0%,15%{opacity:0}55%,100%{opacity:1}}
    .diss-top{animation:diss-tk 2.6s ease-in-out infinite}
    @keyframes diss-tk{0%,15%{opacity:1}55%,100%{opacity:0}}
  </style>
  <defs>
    <clipPath id="diss-c"><rect x="40" y="10" width="52" height="44" rx="5"/></clipPath>
    <pattern id="diss-dots" width="6" height="6" patternUnits="userSpaceOnUse"><circle cx="3" cy="3" r="1.6" fill="#5b8fe0"/></pattern>
  </defs>
  <g clip-path="url(#diss-c)">
    <rect x="40" y="10" width="52" height="44" fill="#2f74e6"/><circle cx="78" cy="24" r="6" fill="#fbbf24"/>
    <g class="diss-top"><rect x="40" y="10" width="52" height="44" fill="#bcd3f7"/><circle cx="54" cy="24" r="6" fill="#fbbf24"/><path d="M40 54 L58 34 L72 46 L92 30 L92 54 Z" fill="#5b8fe0"/></g>
    <rect class="diss-d" x="40" y="10" width="52" height="44" fill="url(#diss-dots)"/>
  </g>
  
</svg>
