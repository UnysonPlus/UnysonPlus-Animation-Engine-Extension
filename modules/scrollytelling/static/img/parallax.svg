<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 96" role="img" aria-label="Parallax">
  <style>
    .plb{animation:plb 2.8s ease-in-out infinite}
    @keyframes plb{0%,100%{transform:translateX(-4px)}50%{transform:translateX(4px)}}
    .plf{animation:plf 2.8s ease-in-out infinite}
    @keyframes plf{0%,100%{transform:translateX(6px)}50%{transform:translateX(-6px)}}
  </style>
  <defs><clipPath id="pl"><rect x="40" y="10" width="52" height="44" rx="5"/></clipPath></defs>
  <g clip-path="url(#pl)">
    <rect x="40" y="10" width="52" height="44" fill="#dbeafe"/>
    <g class="plb"><path d="M32 54 L54 30 L76 54 Z" fill="#7ea9e8"/><path d="M60 54 L84 32 L100 54 Z" fill="#bcd3f7"/></g>
    <g class="plf"><circle cx="66" cy="46" r="9" fill="#2f74e6"/></g>
  </g>
  <text x="66" y="86" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="15" font-weight="600" fill="#475569">Parallax</text>
</svg>
