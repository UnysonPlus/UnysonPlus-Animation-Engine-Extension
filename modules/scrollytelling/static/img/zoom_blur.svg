<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 78" role="img" aria-label="Zoom Blur">
  <style>
    .zbt{animation:zbt 2.6s ease-in-out infinite;transform-origin:66px 32px}
    @keyframes zbt{0%,15%{transform:scale(.55);filter:blur(2.5px)}60%,100%{transform:scale(1);filter:blur(0)}}
  </style>
  <defs><clipPath id="zb"><rect x="40" y="10" width="52" height="44" rx="5"/></clipPath></defs>
  <g clip-path="url(#zb)">
    <rect x="40" y="10" width="52" height="44" fill="#bcd3f7"/>
    <g class="zbt"><circle cx="54" cy="24" r="6" fill="#fbbf24"/><path d="M40 54 L58 34 L72 46 L92 30 L92 54 Z" fill="#2f74e6"/></g>
  </g>
  
</svg>
