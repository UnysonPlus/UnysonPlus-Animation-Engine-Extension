<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 96" role="img" aria-label="Scan (CRT)">
  <style>
    .scl{animation:scl 2.6s ease-in-out infinite}
    @keyframes scl{0%{transform:translateY(0)}100%{transform:translateY(44px)}}
  </style>
  <defs><clipPath id="sc"><rect x="40" y="10" width="52" height="44" rx="5"/></clipPath></defs>
  <g clip-path="url(#sc)">
    <rect x="40" y="10" width="52" height="44" fill="#2f74e6"/>
    <circle cx="60" cy="26" r="6" fill="#fbbf24"/><path d="M40 54 L58 36 L72 48 L92 32 L92 54 Z" fill="#bcd3f7"/>
    <g shape-rendering="crispEdges" fill="#1e3a6a" opacity=".45">
      <rect x="40" y="12" width="52" height="2"/><rect x="40" y="18" width="52" height="2"/><rect x="40" y="24" width="52" height="2"/><rect x="40" y="30" width="52" height="2"/><rect x="40" y="36" width="52" height="2"/><rect x="40" y="42" width="52" height="2"/><rect x="40" y="48" width="52" height="2"/>
    </g>
    <rect class="scl" x="40" y="10" width="52" height="4" fill="#dbeafe" opacity=".9"/>
  </g>
  <text x="66" y="86" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="15" font-weight="600" fill="#475569">Scan</text>
</svg>
