<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 96" role="img" aria-label="Cube">
  <style>
    .cube-g{transform-box:fill-box;transform-origin:center;animation:cube-k 2.6s ease-in-out infinite}
    @keyframes cube-k{0%,15%{transform:perspective(150px) rotateX(0deg)}55%,100%{transform:perspective(150px) rotateX(-90deg)}}
    .cube-a{animation:cube-af 2.6s ease-in-out infinite}
    @keyframes cube-af{0%,30%{opacity:1}50%,100%{opacity:0}}
    .cube-b{animation:cube-bf 2.6s ease-in-out infinite}
    @keyframes cube-bf{0%,30%{opacity:0}50%,100%{opacity:1}}
  </style>
  <defs><clipPath id="cube-c"><rect x="40" y="10" width="52" height="44" rx="5"/></clipPath></defs>
  <g clip-path="url(#cube-c)"><g class="cube-g">
    <g class="cube-a"><rect x="40" y="10" width="52" height="44" fill="#bcd3f7"/><circle cx="54" cy="24" r="6" fill="#fbbf24"/><path d="M40 54 L58 34 L72 46 L92 30 L92 54 Z" fill="#5b8fe0"/></g>
    <g class="cube-b"><rect x="40" y="10" width="52" height="44" fill="#7ea9e8"/><circle cx="78" cy="24" r="6" fill="#fbbf24"/><path d="M40 54 L52 40 L66 50 L82 34 L92 54 Z" fill="#2f74e6"/></g>
  </g></g>
  <text x="66" y="86" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="15" font-weight="600" fill="#475569">Cube</text>
</svg>
