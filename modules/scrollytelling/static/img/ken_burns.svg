<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 96" role="img" aria-label="Ken Burns">
  <style>
    .kbt{animation:kbt 2.8s ease-in-out infinite;transform-origin:66px 32px}
    @keyframes kbt{0%{transform:scale(1) translate(0,0)}50%{transform:scale(1.25) translate(-5px,-4px)}100%{transform:scale(1) translate(0,0)}}
  </style>
  <defs><clipPath id="kb"><rect x="40" y="10" width="52" height="44" rx="5"/></clipPath></defs>
  <g clip-path="url(#kb)">
    <g class="kbt"><rect x="40" y="10" width="52" height="44" fill="#bcd3f7"/><circle cx="54" cy="24" r="6" fill="#fbbf24"/><path d="M40 54 L58 34 L72 46 L92 30 L92 54 Z" fill="#2f74e6"/></g>
  </g>
  <text x="66" y="86" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="15" font-weight="600" fill="#475569">Ken Burns</text>
</svg>
