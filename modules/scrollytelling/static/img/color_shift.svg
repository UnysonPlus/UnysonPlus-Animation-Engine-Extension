<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 96" role="img" aria-label="Color Shift">
  <style>
    .csg{animation:csg 2.8s linear infinite;transform-origin:66px 32px}
    @keyframes csg{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}
  </style>
  <defs><clipPath id="cs"><rect x="40" y="10" width="52" height="44" rx="5"/></clipPath></defs>
  <g clip-path="url(#cs)">
    <g class="csg"><rect x="40" y="10" width="52" height="44" fill="#bcd3f7"/><circle cx="54" cy="24" r="6" fill="#fbbf24"/><path d="M40 54 L58 34 L72 46 L92 30 L92 54 Z" fill="#2f74e6"/></g>
  </g>
  <text x="66" y="86" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="15" font-weight="600" fill="#475569">Color Shift</text>
</svg>
