<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 96" role="img" aria-label="Tilt 3D">
  <style>
    .tilt-g{transform-box:fill-box;transform-origin:center;animation:tilt-k 2.6s ease-in-out infinite}
    @keyframes tilt-k{0%,15%{transform:perspective(160px) rotateX(55deg);opacity:0}55%,100%{transform:perspective(160px) rotateX(0deg);opacity:1}}
  </style>
  <defs><clipPath id="tilt-c"><rect x="40" y="10" width="52" height="44" rx="5"/></clipPath></defs>
  <g clip-path="url(#tilt-c)">
    <rect x="40" y="10" width="52" height="44" fill="#bcd3f7"/><path d="M40 54 L58 34 L72 46 L92 30 L92 54 Z" fill="#7ea9e8"/>
    <g class="tilt-g"><rect x="40" y="10" width="52" height="44" fill="#5b8fe0"/><circle cx="66" cy="26" r="6" fill="#fbbf24"/><path d="M40 54 L52 40 L66 50 L82 34 L92 54 Z" fill="#2f74e6"/></g>
  </g>
  <text x="66" y="86" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="15" font-weight="600" fill="#475569">Tilt 3D</text>
</svg>
