<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 78" role="img" aria-label="Flip">
  <style>
    .flip-g{transform-box:fill-box;transform-origin:center;animation:flip-k 2.6s ease-in-out infinite}
    @keyframes flip-k{0%,15%{transform:perspective(140px) rotateY(0deg)}55%,100%{transform:perspective(140px) rotateY(180deg)}}
    .flip-a{animation:flip-af 2.6s ease-in-out infinite}
    @keyframes flip-af{0%,34%{opacity:1}44%,100%{opacity:0}}
    .flip-b{animation:flip-bf 2.6s ease-in-out infinite}
    @keyframes flip-bf{0%,34%{opacity:0}44%,100%{opacity:1}}
  </style>
  <defs><clipPath id="flip-c"><rect x="40" y="10" width="52" height="44" rx="5"/></clipPath></defs>
  <g clip-path="url(#flip-c)"><g class="flip-g">
    <g class="flip-a"><rect x="40" y="10" width="52" height="44" fill="#bcd3f7"/><circle cx="54" cy="24" r="6" fill="#fbbf24"/><path d="M40 54 L58 34 L72 46 L92 30 L92 54 Z" fill="#5b8fe0"/></g>
    <g class="flip-b"><rect x="40" y="10" width="52" height="44" fill="#7ea9e8"/><circle cx="78" cy="24" r="6" fill="#fbbf24"/><path d="M40 54 L52 40 L66 50 L82 34 L92 54 Z" fill="#2f74e6"/></g>
  </g></g>
  
</svg>
